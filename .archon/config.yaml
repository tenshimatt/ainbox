# Project-scoped Archon harness config for Task Response.
# Read by archon-cli when run from the repo root.
# Pandomagic conversion: 2026-05-08 (dark-factory mode).
# Renamed Ainbox → Task Response and consolidated pipeline: 2026-05-16.

worktree:
  baseBranch: main

# Per-project Obsidian docs (used by workflow nodes that read/write
# the PRD anchor + architecture diagrams). For Task Response the PRD lives
# in-repo at docs/prd.md; Obsidian holds the ops doc only.
obsidian:
  project: /Users/mattwright/pandora/Obsidian/PROJECTS/Task Response
  prd_in_repo: docs/prd.md      # PRD lives in repo, not Obsidian
  architecture_dir: docs/architecture

# External services the workflow nodes call into.
integrations:
  plane:
    base_url: https://plane.beyondpandora.com
    workspace: beyond-pandora
    project_id: b8bd07d5-eba9-4470-94ae-a4cec5abc2f2   # Task Response in Plane (canonical, single pipeline)
    labels:
      archon_ready: 8734486b-03b8-4c71-a89c-d3f52e347325
      archon_running: 3d036f8a-9c5a-48dc-b3a9-11de3dac723e
      archon_done: 40909953-bfb1-4193-bd15-0d473c0437fb
      archon_failed: 605fd32d-cff6-41b3-a64b-9b5fbf927b06
    states:
      backlog: 565e8561-8a32-40cb-980b-975452d46077
      todo: 0a0f43ea-0745-4062-b808-cefb3f63f2d8
      in_progress: 24381093-433d-4880-ae96-d80ac632dd6a
      done: 4c99844c-4808-41da-89c8-1b4d5db79ee7
      cancelled: 61c8d4dc-f6e9-4c46-b909-ec71931ef23c
    # token loaded via env PLANE_API_TOKEN
  archon_rag:
    base_url: http://10.90.10.55:8181
    project_id: da8c5635-b18c-4595-ba06-9c3e268dd3d3   # Ainbox in Archon v1
  github:
    repo: tenshimatt/ainbox      # to be created in Phase 5
    default_reviewer: tenshimatt
  litellm:
    base_url: https://ai-gateway.beyondpandora.com/v1
    # virtual key loaded via env LITELLM_API_KEY (per-tenant in v1)

# Dark-factory: gates execute (audit trail) but auto-approve.
# Hard halts still apply (see factory-rules.md §4).
dark_factory:
  enabled: true
  auto_approve_gates:
    - prd
    - plan
    - pr
  pr_cooling_seconds: 60         # gate-pr waits 60s for live :reject:
  daily_budget_dollars: 50
  per_run_halt_dollars: 10

# Telegram notifications via Hermes bot.
notifications:
  telegram:
    enabled: true
    chat_id: 374047225           # Matt's DM
    helper_script: .archon/scripts/notify-tg.sh
    events:
      - mission_triage_reject
      - gate_prd
      - gate_plan
      - gate_pr
      - implement_halt
      - validate_fail
      - pr_open
      - budget_halt

# Pyramid lanes (per docs/architecture/levels.md).
classifier:
  lane_defaults:
    L1: cosmetic
    L2: minor
    L3: major
    L4: contract
    L5: escalate
  smoke_must_pass: tests/smoke
  contract_dir: tests/contracts

# Cost discipline.
cost:
  default_provider_workers: deepseek
  default_model_workers: deepseek-v4-pro
  flash_nodes:
    - mission-triage
    - plane-tickets
    - open-pr
  claude_nodes:
    architect-review:
      model: claude-opus-4-7
    implement:
      model: claude-sonnet-4-6
    test-first:
      model: claude-sonnet-4-6
