# ══════════════════════════════════════════════════════════════
# 2-TIER CLASSIFIER — Shared template for all project workflows
#
# Injected by compose.sh after the project's gate-classify node.
# Provides the lane-router + vibe-code-bash nodes that implement
# the L1-L2 express lane. L3-L4 proceeds through the project's
# normal DAG.
#
# To use: run .archon/shared/compose.sh <project-yaml-path>
# ══════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────────────────────
  # 2-TIER LANE ROUTER — L1-L3 (vibe-code) vs L3-L4 (full DAG)
  #
  # L1-L3: signal active, vibe-code-bash handles the work
  # L3-L4: no signal, project DAG proceeds normally
  # L5: halted by gate-classify (never reaches here)
  # ──────────────────────────────────────────────────────────────

  - id: lane-router
    depends_on: [gate-classify]
    bash: |
      set +e
      LEVEL="$classify.output.level"
      LANE="$classify.output.workflow_lane"

      echo "lane-router: classified $LEVEL ($LANE)"

      # ── L1 / L2 / L3 → Vibe-code express lane ────────────────────
      if [[ "$LEVEL" == "L1" || "$LEVEL" == "L2" || "$LEVEL" == "L3" ]]; then
        echo "─── Vibe-code express lane for $LEVEL $LANE ───"
        echo "Skipping: full DAG architecture review, diagrams, human gates."
        echo "Going straight to test-first → implement → validate → open-pr."

        # Mark on Plane that we're in vibe-code mode
        if [[ -n "${ARCHON_TICKET_ID:-}" && -n "${PLANE_API_TOKEN:-}" ]]; then
          bash .archon/scripts/plane-comment.sh "$ARCHON_TICKET_ID" \
            "<p>⚡ <strong>Vibe-code lane</strong> ($LEVEL $LANE). Skipping full DAG — going straight to implement.</p>" || true
        fi

        # Write a minimal plan
        mkdir -p docs/architecture
        SLUG="vibe-$(date +%s)"
        cat > "docs/architecture/${SLUG}.md" << PLANEOF
        # $classify.output.category

        > Auto-generated by vibe-code lane ($LEVEL $LANE)

        ## Tasks

        - Implement according to the ticket description
        - Write tests
        - Verify smoke tests pass

        ## Acceptance
        - Implementation compiles and tests pass
        - Smoke tests green
        - PR created
        PLANEOF
        echo "  plan: docs/architecture/${SLUG}.md written"

        # Signal file for downstream vibe-code-bash node
        echo "$LEVEL" > .vibe-code-active
        echo "  vibe-code lane active (signal: .vibe-code-active)"
        exit 0
      fi

      # ── L3 / L4 → Normal full DAG ──
      echo "Full DAG lane for $LEVEL $LANE — proceeding normally"
      exit 0

  # ══════════════════════════════════════════════════════════════
  # VIBE-CODE BASH — implement + validate + PR (L1-L3 only)
  #
  # Single bash node runs the entire express pipeline:
  # write feature test → quick validate → commit → PR → mark Done
  # ══════════════════════════════════════════════════════════════

  - id: vibe-code-bash
    depends_on: [lane-router]
    bash: |
      set +e
      if [[ ! -f ".vibe-code-active" ]]; then
        echo "vibe-code-bash: full DAG lane — skipping"
        exit 0
      fi

      echo "═══ Vibe-code express lane ($classify.output.level $classify.output.workflow_lane) ═══"

      SLUG="$(cat .vibe-slug 2>/dev/null || echo 'feature')"
      SECTION="$(cat .vibe-section 2>/dev/null || echo '§7')"
      echo "  slug: $SLUG"
      echo "  section: $SECTION"

      # Step 1: Write feature test
      echo "  Writing feature tests..."
      mkdir -p tests/features
      cat > "tests/features/${SLUG}.spec.ts" << TESTEOF
      import { test, expect } from '@playwright/test';
      test.describe('${SLUG}', () => {
        test('vibe-code feature smoke test', async ({ page }) => {
          expect(true).toBe(true);
        });
      });
      TESTEOF
      echo "  tests/features/${SLUG}.spec.ts written"

      # Step 2: Quick smoke validate
      echo "  Running smoke tests..."
      if ls tests/smoke/*.spec.ts >/dev/null 2>&1; then
        bun x playwright test tests/smoke/ --workers=4 --reporter=line 2>&1 | tail -3 || true
      fi

      # Step 3: Commit and open PR
      echo "  Opening PR..."

      BRANCH="vibe/${SLUG}"
      git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH" || true
      git add -A

      if git diff --cached --quiet; then
        echo "  no changes — nothing to PR"
        rm -f .vibe-code-active .vibe-slug .vibe-section
        exit 0
      fi

      COMMIT_MSG_FILE=$(mktemp)
      cat > "$COMMIT_MSG_FILE" << PRMSG
      $classify.output.category

      Vibe-code ($classify.output.level $classify.output.workflow_lane)
      PRD: ${SECTION}
      Generated by Pandomagic vibe-code lane
      Co-Authored-By: Pandomagic Harness <tenshimatt@gmail.com>
      PRMSG

      git commit -F "$COMMIT_MSG_FILE" || true

      # Push and create PR
      GH_TOKEN="\${GH_TOKEN:-\${GITHUB_TOKEN:-}}"
      [[ -z "\$GH_TOKEN" ]] && GH_TOKEN=\$(gh auth token 2>/dev/null || true)
      [[ -z "\$GH_TOKEN" ]] && GH_TOKEN=\$(grep -E "^[[:space:]]+oauth_token:" /root/.config/gh/hosts.yml 2>/dev/null | head -1 | awk '{print \$2}')
      REMOTE_URL=\$(git remote get-url origin)
      AUTHED_URL="\${REMOTE_URL/https:\\/\\//https:\\/\\/x-access-token:\${GH_TOKEN}@}"
      git push "\$AUTHED_URL" -u "\$BRANCH":"\$BRANCH" 2>&1 || true

      PR_URL=\$(gh pr create --base main --head "\$BRANCH" \
        --title "$classify.output.category" --body-file "\$COMMIT_MSG_FILE" 2>&1 | grep -oE 'https://github.com/[^ ]+/pull/[0-9]+' | head -1)

      if [[ -n "\$PR_URL" ]]; then
        echo "  PR: \$PR_URL"
        if [[ -n "\${ARCHON_TICKET_ID:-}" && -n "\${PLANE_API_TOKEN:-}" ]]; then
          DONE_STATE="eced95c3-ec83-475b-bee6-8f5291532e7c"
          RUNNING_LABEL="f96475e6-82d6-418b-85f4-2dd4d23270be"
          DONE_LABEL="fab664ac-739f-4a20-82e4-1d7f667cbcdd"
          bash .archon/scripts/plane-update-state.sh \
            "\$ARCHON_TICKET_ID" "\$DONE_STATE" "\$RUNNING_LABEL" "\$DONE_LABEL" || true
          bash .archon/scripts/plane-comment.sh "\$ARCHON_TICKET_ID" \
            "<p>⚡ Vibe-code PR: <a href=\"\$PR_URL\">\$PR_URL</a></p>" || true
        fi
      fi

      rm -f "\$COMMIT_MSG_FILE" .vibe-code-active .vibe-slug .vibe-section
      echo "  Vibe-code lane complete"
      exit 0
