{name: ainbox-feature-vibe,description: "Vibe-code express lane for Ainbox. Fast path for routine feature work (L1-L4). Skips PRD extension, BDATSI diagrams, architect/security reviews, and human gates — goes straight to classify -> implement -> validate -> open-pr.\n\nTriggered by poll-side classifier for tickets classified as 'vibe' lane.\n\nUse when: any non-infrastructure, non-schema Ainbox feature work.\nNOT for: schema changes, infra/platform changes, breaking API changes, security work.\n",provider: deepseek,nodes: [{id: prime-context,bash: "# Rail #11: hard workspace reset every run.\ngit checkout main 2>/dev/null || true\ngit fetch origin main --quiet 2>/dev/null || true\ngit reset --hard origin/main 2>/dev/null || true\ngit clean -fdx 2>/dev/null || true\ngh auth setup-git 2>/dev/null || true\ngit config --global user.email tenshimatt@gmail.com 2>/dev/null || true\ngit config --global user.name \"Pandomagic Vibe\" 2>/dev/null || true\nbash .archon/scripts/prime-context.sh\n\nif [[ -n \"${ARCHON_TICKET_ID:-}\" && -n \"${PLANE_API_TOKEN:-}\" ]]; then\n  IN_PROGRESS_STATE=\"0c4c08e9-2cbb-4152-951f-96dcf1691780\"\n  bash .archon/scripts/plane-update-state.sh \\\n    \"$ARCHON_TICKET_ID\" \"$IN_PROGRESS_STATE\" || true\n  bash .archon/scripts/plane-comment.sh \"$ARCHON_TICKET_ID\" \\\n    \"<p>⚡ Vibe-code lane. Going straight to implement — no PRD, no BDATSI, no gates.</p>\" || true\nfi\n"},{id: classify,depends_on: [prime-context],provider: deepseek,model: deepseek-v4-pro,context: fresh,prompt: "You are the Pandomagic classifier. Read docs/architecture/levels.md from the project root.\n\nUser input: $ARGUMENTS\n\nTasks:\n1. Classify the feature: L1, L2, L3, or L4 (L5 should have been caught by poll-side classifier).\n2. List regression tests that must stay green (at minimum: tests/smoke/).\n3. True/false: does this change touch auth/RLS/PII/security boundaries?\n4. True/false: does this change add or modify a database schema, migration, or table?\n5. True/false: does this change require new environment variables or secrets?\n\nOutput JSON.\n",output_format: {type: object,properties: {level: {type: string,enum: [L1,L2,L3,L4]},category: {type: string},regression_must_pass: {type: array,items: {type: string}},touches_security: {type: boolean},touches_schema: {type: boolean},needs_env_vars: {type: boolean},notes: {type: string}},required: [level,category,regression_must_pass,touches_security,touches_schema,needs_env_vars,notes]}},{id: implement,depends_on: [classify],provider: deepseek,model: deepseek-v4-pro,context: fresh,max_turns: 30,prompt: "Implement the feature described in the user input.\n\nUser input: $ARGUMENTS\n\n## Context\nThis is a vibe-code lane — no PRD, no architecture diagrams, no plan review.\nJust implement the feature directly.\n\n## Approach\n1. Read the codebase to understand existing patterns (look at src/pages/, src/components/, supabase/functions/)\n2. Implement the feature following EXISTING patterns\n3. Write Playwright tests in tests/features/\n4. Run `bun x playwright test --project=iphone-15 tests/features/<your-files>` to verify GREEN\n5. If red, fix until green\n\n## Constraints\n- Do NOT change existing test files\n- Do NOT touch unrelated code\n- Follow existing patterns exactly (imports, component structure, error handling)\n- If this is an edge function, create it in supabase/functions/<name>/\n- If this adds a new page, wire it into src/App.tsx or the router\n\n## Output\nAfter implementation, write a brief summary to stdout.\n",output_format: {type: object,properties: {files_changed: {type: array,items: {type: string}},tests_green: {type: boolean},summary: {type: string}},required: [files_changed,tests_green,summary]}},{id: validate,depends_on: [implement],bash: "set +e\nLEVEL=\"$classify.output.level\"\n# Kill any orphan dev server holding port 3001 (previous workflow may have leaked one)\npkill -9 -f \"next dev\\|next-server\\|npm run dev\" 2>/dev/null || true\n# Wait for port to actually free (kernel may hold TIME_WAIT briefly)\nfor i in 1 2 3 4 5; do\n  ss -tlnp 2>/dev/null | grep -q :3001 || break\n  sleep 1\ndone\nbun install --frozen-lockfile || bun install\n\nCHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' 2>/dev/null | tr '\n' ' ')\nif [[ -n \"$CHANGED_FILES\" ]]; then\n  bun x eslint $CHANGED_FILES || echo \"(lint warnings)\"\nfi\n\nif ls tests/smoke/*.spec.ts >/dev/null 2>&1; then\n  bun x playwright test tests/smoke/ --workers=4 --reporter=line || { echo \"✗ smoke failed\" >&2; exit 1; }\nfi\n\nNEW_TESTS=$(git ls-files --others --exclude-standard tests/features 2>/dev/null | grep '\\.spec\\.ts$' | tr '\n' ' ')\nif [[ -z \"$NEW_TESTS\" ]]; then\n  NEW_TESTS=$(git diff --name-only --diff-filter=A origin/main...HEAD -- tests/ 2>/dev/null | grep '\\.spec\\.ts$' | tr '\n' ' ')\nfi\nif [[ -n \"$NEW_TESTS\" ]]; then\n  bun x playwright test $NEW_TESTS --workers=4 --reporter=line || { echo \"✗ feature tests failed\" >&2; exit 3; }\nfi\n\necho \"validate passed\"\nexit 0\n"},{id: open-pr,depends_on: [validate],bash: "set +e\nSLUG=\"vibe-$(date +%s)\"\nBRANCH=\"vibe/${SLUG}\"\n\ngit checkout -b \"$BRANCH\" 2>/dev/null || git checkout \"$BRANCH\"\n[[ $? -ne 0 ]] && { echo \"✗ branch checkout failed\" >&2; exit 7; }\ngit add -A\nif git diff --cached --quiet; then\n  echo \"no changes — nothing to PR\"\n  exit 0\nfi\n\nTITLE=\"$(echo \"$ARGUMENTS\" | head -1 | head -c 70)\"\n[[ -z \"$TITLE\" ]] && TITLE=\"vibe: feature\"\n\nCOMMIT_MSG_FILE=$(mktemp)\ncat > \"$COMMIT_MSG_FILE\" << PRMSG\n$TITLE\n\nVibe-code lane ($classify.output.level)\nGenerated by Pandomagic vibe-code lane\nCo-Authored-By: Pandomagic Vibe Harness <tenshimatt@gmail.com>\nPRMSG\n\ngit commit -F \"$COMMIT_MSG_FILE\" || { echo \"✗ commit failed\" >&2; rm -f \"$COMMIT_MSG_FILE\"; exit 9; }\n\nGH_TOKEN=\"${GH_TOKEN:-}\"\n[[ -z \"$GH_TOKEN\" ]] && GH_TOKEN=$(gh auth token 2>/dev/null || true)\n[[ -z \"$GH_TOKEN\" ]] && GH_TOKEN=$(grep -E \"^[[:space:]]+oauth_token:\" /root/.config/gh/hosts.yml 2>/dev/null | head -1 | awk '{print $2}')\nif [[ -z \"$GH_TOKEN\" ]]; then\n  echo \"✗ no GitHub token\" >&2\n  exit 12\nfi\nREMOTE_URL=$(git remote get-url origin)\nAUTHED_URL=\"${REMOTE_URL/github.com/x-access-token:${GH_TOKEN}@github.com}\"\ngit push \"$AUTHED_URL\" -u \"$BRANCH\":\"$BRANCH\" 2>&1 || { echo \"✗ push failed\" >&2; exit 10; }\n\nPR_URL=$(gh pr create --base main --head \"$BRANCH\" \\\n  --title \"$TITLE\" --body-file \"$COMMIT_MSG_FILE\" 2>&1 | grep -oE 'https://github.com/[^ ]+/pull/[0-9]+' | head -1)\n\nif [[ -n \"$PR_URL\" ]]; then\n  echo \"PR opened: $PR_URL\"\n  if [[ -n \"${ARCHON_TICKET_ID:-}\" && -n \"${PLANE_API_TOKEN:-}\" ]]; then\n    DONE_STATE=\"eced95c3-ec83-475b-bee6-8f5291532e7c\"\n    RUNNING_LABEL=\"f96475e6-82d6-418b-85f4-2dd4d23270be\"\n    DONE_LABEL=\"fab664ac-739f-4a20-82e4-1d7f667cbcdd\"\n    bash .archon/scripts/plane-update-state.sh \\\n      \"$ARCHON_TICKET_ID\" \"$DONE_STATE\" \"$RUNNING_LABEL\" \"$DONE_LABEL\" || true\n    bash .archon/scripts/plane-comment.sh \"$ARCHON_TICKET_ID\" \\\n      \"<p>⚡ Vibe-code PR: <a href=\\\"$PR_URL\\\">$PR_URL</a></p>\" || true\n  fi\nfi\n\nrm -f \"$COMMIT_MSG_FILE\"\nexit 0\n"}]}
